name: Deploy CricManager to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo layout (debug)
        run: |
          echo "--- root ---"
          ls -la
          echo "--- frontend/ ---"
          ls -la frontend || echo "NO frontend/ folder"
          echo "--- frontend/yarn.lock? ---"
          ls -la frontend/yarn.lock 2>/dev/null || echo "yarn.lock missing (ok, will regenerate)"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build
        working-directory: frontend
        run: yarn build
        env:
          CI: "false"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
